<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | NETRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-black text-gray-200 flex items-center justify-center h-screen w-full relative overflow-hidden">

    <!-- Background Gradients -->
    <div class="fixed inset-0 pointer-events-none">
        <div
            class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-green-900/40 via-black to-black">
        </div>
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-green-500/10 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-emerald-500/5 rounded-full blur-[80px]"></div>
    </div>

    <!-- Main Card -->
    <div class="glass p-8 rounded-2xl w-full max-w-md relative z-10 text-center border border-white/5 shadow-2xl mx-4">

        <!-- Icon -->
        <div class="mb-8">
            <div
                class="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-500/20 shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Reset Password</h1>
            <p class="text-gray-400 text-sm">Create a new secure password for your account.</p>
        </div>

        <form method="POST" class="space-y-4">
            <div class="text-left">
                <label class="text-xs text-gray-400 uppercase font-bold ml-1">New Password</label>
                <input id="password" type="password" name="password" required placeholder="••••••••"
                    class="w-full bg-black/30 border border-white/10 text-white rounded-xl p-3 focus:outline-none focus:border-green-500/50 focus:ring-1 focus:ring-green-500/50 transition-all placeholder-gray-600 mt-1">
                <div id="password-strength" class="text-xs mt-1 h-4"></div>
            </div>

            <div class="text-left">
                <label class="text-xs text-gray-400 uppercase font-bold ml-1">Confirm Password</label>
                <input id="confirm_password" type="password" name="confirm_password" required placeholder="••••••••"
                    class="w-full bg-black/30 border border-white/10 text-white rounded-xl p-3 focus:outline-none focus:border-green-500/50 focus:ring-1 focus:ring-green-500/50 transition-all placeholder-gray-600 mt-1">
                <div id="password-match" class="text-xs mt-1 text-red-400 h-4"></div>
            </div>

            <button id="reset-btn" type="submit" disabled
                class="w-full bg-gradient-to-r from-green-600 to-emerald-700 hover:from-green-500 hover:to-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-500/20 transform hover:scale-[1.02] transition-all duration-200 border border-t-white/10 mt-6 opacity-50 cursor-not-allowed">
                Update Password
            </button>
        </form>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const passwordInput = document.getElementById('password');
                const confirmInput = document.getElementById('confirm_password');
                const resetBtn = document.getElementById('reset-btn');
                const strengthDiv = document.getElementById('password-strength');
                const matchDiv = document.getElementById('password-match');

                function validatePassword(password) {
                    const re = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
                    return re.test(password);
                }

                function checkForm() {
                    const isPasswordValid = validatePassword(passwordInput.value);
                    const isMatch = passwordInput.value === confirmInput.value && passwordInput.value !== '';

                    if (isPasswordValid && isMatch) {
                        resetBtn.disabled = false;
                        resetBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        resetBtn.classList.add('cursor-pointer');
                    } else {
                        resetBtn.disabled = true;
                        resetBtn.classList.add('opacity-50', 'cursor-not-allowed');
                        resetBtn.classList.remove('cursor-pointer');
                    }
                }

                passwordInput.addEventListener('input', function () {
                    const val = this.value;
                    if (!val) {
                        strengthDiv.textContent = '';
                        return;
                    }

                    if (validatePassword(val)) {
                        strengthDiv.textContent = 'Strong password';
                        strengthDiv.className = 'text-xs mt-1 h-4 text-green-400';
                        this.style.borderColor = 'rgba(34, 197, 94, 0.5)';
                    } else {
                        strengthDiv.textContent = 'Weak: Need 8+ chars, Upper, Lower, Number, Special';
                        strengthDiv.className = 'text-xs mt-1 h-4 text-yellow-400';
                        this.style.borderColor = 'rgba(250, 204, 21, 0.5)';
                    }
                    checkForm();
                    if (confirmInput.value) confirmInput.dispatchEvent(new Event('input'));
                });

                confirmInput.addEventListener('input', function () {
                    if (this.value !== passwordInput.value) {
                        matchDiv.textContent = 'Passwords do not match';
                        this.style.borderColor = 'rgba(248, 113, 113, 0.5)';
                    } else {
                        matchDiv.textContent = '';
                        this.style.borderColor = 'rgba(34, 197, 94, 0.5)';
                    }
                    checkForm();
                });
            });
        </script>

        {% if error %}
        <div class="mt-6 p-3 bg-red-500/10 border border-red-500/20 rounded-lg animate-pulse">
            <p class="text-red-400 text-sm flex items-center justify-center gap-2 font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
                {{ error }}
            </p>
        </div>
        {% endif %}
    </div>
</body>

</html>
