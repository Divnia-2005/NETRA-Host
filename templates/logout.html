<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out — NETRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1f0f 0%, #050b07 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(19, 236, 91, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: rgba(19, 236, 91, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: #13ec5b;
            position: relative;
        }

        .check-icon svg {
            width: 40px;
            height: 40px;
            animation: checkmark 0.5s ease-in-out forwards;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        @keyframes checkmark {
            to { stroke-dashoffset: 0; }
        }

        .glow {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(19, 236, 91, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .btn-home {
            background: #13ec5b;
            color: #050b07;
            font-weight: 700;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            margin-top: 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(19, 236, 91, 0.3);
        }

        .btn-home:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(19, 236, 91, 0.5);
            background: #19ff64;
        }

        .redirect-text {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-top: 1.5rem;
        }

        #countdown {
            color: #13ec5b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="glass">
        <div class="check-icon">
            <div class="glow"></div>
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-3xl font-bold mb-4">Logged Out Successfully</h1>
        <p class="text-gray-400">Your session has been securely ended. Thank you for using NETRA.</p>
        
        <a href="/" class="btn-home">Return to Home</a>
        
        <p class="redirect-text">
            Redirecting to landing page in <span id="countdown">3</span>s...
        </p>
    </div>

    <script>
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownEl.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = '/';
            }
        }, 1000);
    </script>
</body>
</html>
